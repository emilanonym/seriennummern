<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Seriennummern-Scanner</title>
<meta name="theme-color" content="#0F1987">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0f172a; color:#e2e8f0; }
  header { padding:14px 16px; font-size:17px; font-weight:600; background:#0F1987; }
  #reader { width:100%; }
  .bar { display:flex; gap:10px; padding:12px 16px; }
  button { flex:1; padding:14px; font-size:16px; font-weight:600; border:none; border-radius:10px; color:#fff; }
  #startBtn { background:#16a34a; }
  #stopBtn  { background:#dc2626; }
  #torchBtn { background:#475569; flex:0 0 56px; font-size:22px; padding:14px 0; }
  #torchBtn.on { background:#f59e0b; }
  button:disabled { opacity:.4; }
  #status { margin:0 16px 8px; padding:12px 14px; border-radius:10px; background:#1e293b; font-size:15px; }
  #status.ok  { background:#14532d; }
  #status.dup { background:#78350f; }
  #status.err { background:#7f1d1d; }
  .count { padding:0 16px 8px; font-size:13px; color:#94a3b8; }
  ul { list-style:none; margin:0; padding:0 16px 24px; }
  li { padding:10px 12px; border-bottom:1px solid #1e293b; font-size:15px; display:flex; justify-content:space-between; }
  li.dup .tag { color:#fbbf24; }
  li.ok  .tag { color:#4ade80; }
</style>
</head>
<body>
<header>📷 Seriennummern-Scanner</header>
<div id="reader"></div>
<div class="bar">
  <button id="startBtn">Scan starten</button>
  <button id="stopBtn" disabled>Stopp</button>
  <button id="torchBtn" disabled title="Taschenlampe">🔦</button>
</div>
<div id="status">Bereit. Auf „Scan starten" tippen.</div>
<div class="count" id="count"></div>
<ul id="list"></ul>

<script>
/*** Konfiguration ***/
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4OK6t9DtZZZDhXOZLPQOYqcd7LO4sPK0pjCFfCvxOjaJC31VdFsPPv53rrQkLdjWTjA/exec';
const TOKEN           = 'sn7Qe2vKptaX8';

let html5QrCode = null, lastCode = '', lastTime = 0, sessionCount = 0, torchOn = false;
let totalCount = null, audioCtx = null, flushing = false;

const formats = [
  Html5QrcodeSupportedFormats.CODE_128,
  Html5QrcodeSupportedFormats.CODE_39,
  Html5QrcodeSupportedFormats.CODE_93,
  Html5QrcodeSupportedFormats.ITF,
  Html5QrcodeSupportedFormats.CODABAR,
  Html5QrcodeSupportedFormats.QR_CODE
];

function setStatus(t, c){ const s=document.getElementById('status'); s.textContent=t; s.className=c||''; }

/*** Signalton beim Scan ***/
function initAudio(){
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e){}
}
function beep(){
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'square'; o.frequency.value = 1400;
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.12);
  } catch(e){}
}

/*** Offline-Warteschlange: fehlgeschlagene Codes merken und nachsenden ***/
const QUEUE_KEY = 'sn_offline_queue';
function loadQueue(){ try { return JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; } catch(e){ return []; } }
function saveQueue(q){ try { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); } catch(e){} }
function enqueue(code){ const q = loadQueue(); if (q.indexOf(code) === -1){ q.push(code); saveQueue(q); } updateCount(); }
function flushQueue(){
  if (flushing) return;
  const q = loadQueue();
  if (!q.length) return;
  flushing = true;
  sendCode(q[0]).then(function(res){
    const q2 = loadQueue(), i = q2.indexOf(q[0]);
    if (i !== -1){ q2.splice(i, 1); saveQueue(q2); }
    flushing = false;
    onSaved(res);
    flushQueue();
  }).catch(function(){ flushing = false; });
}

function updateCount(){
  const parts = [sessionCount + ' neu in dieser Sitzung'];
  if (totalCount !== null) parts.push(totalCount + ' gesamt');
  const q = loadQueue();
  if (q.length) parts.push(q.length + ' warten auf Upload');
  document.getElementById('count').textContent = parts.join(' · ');
}

/*** JSONP-Aufruf ans Apps Script (umgeht CORS) ***/
function sendCode(code){
  return new Promise(function(resolve, reject){
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
    const script = document.createElement('script');
    let done = false;
    function cleanup(){ delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); }
    const timeout = setTimeout(function(){ if(!done){ done=true; cleanup(); reject(new Error('Timeout')); } }, 12000);
    window[cb] = function(data){ if(!done){ done=true; clearTimeout(timeout); cleanup(); resolve(data); } };
    script.onerror = function(){ if(!done){ done=true; clearTimeout(timeout); cleanup(); reject(new Error('Netzwerkfehler')); } };
    script.src = APPS_SCRIPT_URL + '?action=add'
      + '&token=' + encodeURIComponent(TOKEN)
      + '&code='  + encodeURIComponent(code)
      + '&callback=' + cb;
    document.body.appendChild(script);
  });
}

function onScan(text){
  const now = Date.now();
  if (text === lastCode && now - lastTime < 3000) return;
  lastCode = text; lastTime = now;
  if (navigator.vibrate) navigator.vibrate(80);
  beep();
  setStatus('Speichere: ' + text, '');
  sendCode(text)
    .then(onSaved)
    .catch(function(e){
      enqueue(text);
      setStatus('📡 Keine Verbindung – „' + text + '" gemerkt, wird automatisch nachgesendet.', 'dup');
      addRow(text, 'dup', 'wartet');
    });
}

function onSaved(res){
  if (res.status === 'ok'){ setStatus('✓ Gespeichert: ' + res.code, 'ok'); addRow(res.code,'ok','✓'); sessionCount++; }
  else if (res.status === 'duplicate'){ setStatus('⚠ Schon vorhanden: ' + res.code, 'dup'); addRow(res.code,'dup','Duplikat'); }
  else if (res.status === 'error'){ setStatus('Abgelehnt: ' + (res.message||'Token falsch'), 'err'); }
  if (typeof res.count === 'number') totalCount = res.count;
  updateCount();
}

function addRow(code, cls, tag){
  const li = document.createElement('li'); li.className = cls;
  li.innerHTML = '<span>' + code + '</span><span class="tag">' + tag + '</span>';
  const list = document.getElementById('list'); list.insertBefore(li, list.firstChild);
}

document.getElementById('startBtn').onclick = function(){
  initAudio();
  setStatus('Frage Kamera an …', '');
  html5QrCode = new Html5Qrcode('reader', { formatsToSupport: formats });

  html5QrCode.start(
    { facingMode: 'environment' },
    {
      fps: 15,
      qrbox: { width: 280, height: 90 },
      videoConstraints: {
        facingMode: 'environment',
        width:  { ideal: 1920 },
        height: { ideal: 1080 },
        advanced: [{ focusMode: 'continuous' }]
      }
    },
    onScan, function(){}
  ).then(function(){
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('torchBtn').disabled = false;
    setStatus('Kamera läuft – Barcode anvisieren.', '');
  }).catch(function(err){
    setStatus('Kamera-Fehler: ' + (err.name || err), 'err');
  });
};

document.getElementById('stopBtn').onclick = function(){
  if (!html5QrCode) return;
  html5QrCode.stop().then(function(){
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    const tb = document.getElementById('torchBtn');
    tb.disabled = true; tb.classList.remove('on'); torchOn = false;
    setStatus('Gestoppt.', '');
  });
};

document.getElementById('torchBtn').onclick = function(){
  if (!html5QrCode) return;
  torchOn = !torchOn;
  html5QrCode.applyVideoConstraints({ advanced: [{ torch: torchOn }] })
    .then(function(){ document.getElementById('torchBtn').classList.toggle('on', torchOn); })
    .catch(function(){ torchOn = !torchOn; setStatus('Taschenlampe nicht verfügbar.', 'err'); });
};

window.addEventListener('online', flushQueue);
setInterval(flushQueue, 15000);
flushQueue();
updateCount();
</script>
</body>
</html>
